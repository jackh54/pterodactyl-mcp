services:
  pterodactyl-mcp:
    build: .
    ports:
      - "3000:3000"
    environment:
      PTERODACTYL_PANEL_URL: ${PTERODACTYL_PANEL_URL}
      MCP_ENABLED: ${MCP_ENABLED:-true}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      # Omit AUDIT_LOG_PATH to log audits to container stdout instead.
      AUDIT_LOG_PATH: ${AUDIT_LOG_PATH:-/data/audit.jsonl}
    volumes:
      - mcp-audit:/data
    restart: unless-stopped

volumes:
  mcp-audit:
